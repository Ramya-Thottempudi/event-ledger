server:
  port: 8081
  tomcat:
    threads:
      max: 4

spring:
  application:
    name: event-gateway
  datasource:
    url: jdbc:h2:mem:events;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

account-service:
  url: http://localhost:8082

logging:
  level:
    com.eventledger: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        enabled: false
    tracing:
      export:
        enabled: false
