server:
  port: 8081
  tomcat:
    threads:
      max: 4

spring:
  application:
    name: event-gateway
  datasource:
    url: jdbc:h2:mem:events;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

account-service:
  url: http://localhost:8082

logging:
  level:
    com.eventledger: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        enabled: false
    tracing:
      export:
        enabled: false

resilience4j:
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2
        enable-exponential-backoff: true
        enable-randomized-wait: true
        randomized-wait-multiplier: 0.5
    instances:
      accountService:
        base-config: default
  ratelimiter:
    instances:
      accountService:
        limit-for-period: 100
        limit-refresh-period: 1s
        timeout-duration: 100ms
