services:
  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health 2>/dev/null | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  event-gateway:
    build:
      context: .
      dockerfile: event-gateway/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - ACCOUNT_SERVICE_URL=http://account-service:8082
      - JAVA_OPTS=--enable-preview
    depends_on:
      account-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health 2>/dev/null | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"   # UI
      - "4318:4318"     # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
